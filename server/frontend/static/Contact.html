<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us - Dealerships</title>
  <link rel="stylesheet" href="/static/bootstrap.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    .contact-header {
      text-align: center;
      margin: 30px 0;
    }
    .contact-container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .contact-info {
      margin-top: 30px;
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 20px;
    }
    .contact-info div {
      text-align: center;
    }
    .contact-info img {
      width: 150px;
      border-radius: 10px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007BFF;
      border: none;
      color: white;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light" style="background-color:darkturquoise; height: 1in;">
  <div class="container-fluid">
    <h2 style="padding-right: 5%;">Dealerships</h2>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarText">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" style="font-size: larger;" aria-current="page" href="/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" style="font-size: larger;" href="/about">About Us</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" style="font-size: larger;" href="/contact">Contact Us</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Header -->
<div class="contact-header">
  <h2>Contact Us</h2>
  <p>Have questions or need more information? Reach out to us!</p>
</div>

<!-- Form -->
<div class="contact-container">
  <form action="/send-message" method="POST">

    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" required>

    <label for="subject">Subject</label>
    <input type="text" id="subject" name="subject">

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" required></textarea>

    <button type="submit">Send Message</button>
  </form>
</div>

<!-- Contact Info / Images -->
<div class="contact-info">
  <div>
    <img src="/static/cars.jpeg" alt="Cars">
    <p>Our Dealership Location</p>
    <p>123 Main St, YourCity</p>
  </div>
  <div>
    <img src="/static/contactus.png" alt="Contact Us">
    <p>Call us: +1 234 567 890</p>
    <p>Email: info@dealership.com</p>
  </div>
</div>

<script src="/static/bootstrap.bundle.min.js"></script>
</body>
</html>
